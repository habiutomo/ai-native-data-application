services:
  - type: web
    name: ai-native-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: "llama3"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: ""
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: web
    name: ai-native-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npx serve -s dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ai-native-api
          property: host
      - key: NODE_VERSION
        value: "18"
